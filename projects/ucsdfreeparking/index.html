<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCSD Free Parking Map</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    #banner {
      background-color: #003f7d;
      color: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #banner h1 { font-size: 1.3rem; font-weight: bold; }
    #banner p  { font-size: 0.9rem; opacity: 0.75; }
    #banner .spacer { flex: 1; }

    #banner .discussion-btn {
      text-decoration: none;
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    #banner .discussion-btn:hover {
      background-color: rgba(255,255,255,0.15);
    }

    #map {
      flex: 1;
      position: relative;
    }

    /* ── Legend ── */
    #legend {
      position: fixed;
      bottom: 32px;
      left: 12px;
      background: rgba(255,255,255,0.95);
      border-radius: 8px;
      padding: 8px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: auto;
    }

    #legend h3 {
      font-size: 0.8rem;
      font-weight: bold;
      color: #333;
      margin: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.2);
    }

    .legend-label {
      font-size: 0.8rem;
      color: #333;
    }

    /* ── Hover tooltip ── */
    #tooltip {
      position: fixed;
      background: white;
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
      pointer-events: none;
      z-index: 11;
      display: none;
      max-width: 240px;
    }

    #tooltip strong {
      font-size: 0.95rem;
      display: block;
      margin-bottom: 2px;
    }

    #tooltip .cat {
      color: #888;
      font-size: 0.75rem;
      margin-bottom: 6px;
      display: block;
    }
  </style>
</head>
<body>

  <div id="banner">
    <h1>🗺️ UCSD Free Parking Map</h1>
    <p>Find free parking near campus</p>
    <div class="spacer"></div>
    <a href="/projects/ucsdfreeparking/info" class="discussion-btn">ℹ️ Info</a>
    <a href="/projects/ucsdfreeparking/discussion" class="discussion-btn">💬 Discussion</a>
  </div>

  <div id="map"></div>

  <div id="legend">
    <h3>Legend</h3>
    <div class="legend-item">
      <div class="legend-color" style="background:#2ecc71;"></div>
      <span class="legend-label">General Overnight</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#e74c3c;"></div>
      <span class="legend-label">No Overnight</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#f1c40f;"></div>
      <span class="legend-label">2-Hour Parking</span>
    </div>
    <!-- Add legend items here as you add categories -->
  </div>

  <div id="tooltip"></div>

  <script>
    const categoryStyles = {
      "General Overnight": { color: "#2ecc71", opacity: 0.6 },
      "No Overnight":      { color: "#e74c3c", opacity: 0.6 },
      "2-Hour Parking":    { color: "#f1c40f", opacity: 0.6 },
    };

    const defaultStyle = { color: "#aaaaaa", opacity: 0.5 };

    const bwMapStyle = [
      { elementType: "geometry", stylers: [{ saturation: -100 }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#555555" }] },
      { featureType: "poi", stylers: [{ visibility: "off" }] },
    ];

    function initMap() {
      const ucsd = { lat: 32.8801, lng: -117.2340 };

      const map = new google.maps.Map(document.getElementById("map"), {
        center: ucsd,
        zoom: 15,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false,
        styles: bwMapStyle,
      });

      const tooltip = document.getElementById("tooltip");
      const mapDiv  = document.getElementById("map");

      mapDiv.addEventListener("mousemove", (e) => {
        let x = e.clientX + 16;
        let y = e.clientY + 16;
        if (x + 260 > window.innerWidth)  x = e.clientX - 260;
        if (y + 120 > window.innerHeight) y = e.clientY - 120;
        tooltip.style.left = x + "px";
        tooltip.style.top  = y + "px";
      });

      fetch("/projects/ucsdfreeparking/parking.geojson")
        .then(res => res.json())
        .then(data => {
          data.features.forEach(feature => {
            const props = feature.properties;
            const style = categoryStyles[props.category] || defaultStyle;
            const coords = feature.geometry.coordinates[0].map(([lng, lat]) => ({ lat, lng }));

            const polygon = new google.maps.Polygon({
              paths: coords,
              strokeColor: style.color,
              strokeOpacity: 0.9,
              strokeWeight: 2,
              fillColor: style.color,
              fillOpacity: style.opacity,
              map: map,
            });

            polygon.addListener("mouseover", () => {
              polygon.setOptions({ fillOpacity: 0.85 });
              tooltip.innerHTML = `
                <strong>${props.name}</strong>
                <span class="cat">${props.category}</span>
                ${props.description}
              `;
              tooltip.style.display = "block";
            });

            polygon.addListener("mouseout", () => {
              polygon.setOptions({ fillOpacity: style.opacity });
              tooltip.style.display = "none";
            });
          });
        });
    }
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXw9ehHkH9DA3jcwlIoysqHd0Q3uLAXn4&callback=initMap"
    async defer>
  </script>

</body>
</html>
