<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discussion — UCSD Free Parking Map</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #0a0a0a;
      color: white;
    }

    /* ── Banner ── */
    #banner {
      background-color: #003f7d;
      color: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #banner h1 {
      font-size: 1.3rem;
      font-weight: bold;
    }

    #banner .spacer {
      flex: 1;
    }

    #banner .map-btn {
      text-decoration: none;
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    #banner .map-btn:hover {
      background-color: rgba(255,255,255,0.15);
    }

    /* ── Content ── */
    #content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      gap: 8px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    #content h2 {
      font-size: 1.8rem;
    }

    #content p {
      color: #888;
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .giscus {
      width: 100%;
    }
  </style>
</head>
<body>

  <div id="banner">
    <h1>💬 Discussion</h1>
    <div class="spacer"></div>
    <a href="/projects/ucsdfreeparking" class="map-btn">🗺️ Back to Map</a>
  </div>

  <div id="content">
    <h2>Community Discussion</h2>
    <p>Share tips, report changes, and discuss free parking near UCSD.</p>

    <script src="https://giscus.app/client.js"
            data-repo="kento-bushey/kento-bushey.github.io"
            data-repo-id="R_kgDOR7j90A"
            data-category="Announcements"
            data-category-id="DIC_kwDOR7j90M4C6RKH"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="bottom"
            data-theme="dark_high_contrast"
            data-lang="en"
            data-loading="lazy"
            crossorigin="anonymous"
            async>
    </script>

  </div>

</body>
</html>
