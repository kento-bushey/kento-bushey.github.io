<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Kento Bushey</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #0a0a0a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .back {
      position: absolute;
      top: 24px;
      left: 24px;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back:hover {
      color: white;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .tagline {
      font-size: 1rem;
      color: #888;
      margin-bottom: 24px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 260px;
    }

    .btn {
      display: block;
      text-align: center;
      padding: 14px 0;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
      background-color: #1a1a1a;
      color: white;
      border: 1px solid #333;
    }

    .btn:hover {
      opacity: 0.8;
    }

    .btn-placeholder {
      color: white;
      border: 1px dashed #333;
      cursor: default;
    }

    .btn-placeholder:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

  <a href="/" class="back">← Home</a>

  <h1>Projects</h1>
  <p class="tagline">Things I've built</p>

  <div class="buttons">
    <a href="/projects/ucsdfreeparking" class="btn">UCSD Free Parking Map</a>
    <a class="btn btn-placeholder">Graphics Projects — Coming Soon</a>
  </div>

</body>
</html>
