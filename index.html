<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kento Bushey</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #0a0a0a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .tagline {
      font-size: 1rem;
      color: #888;
      margin-bottom: 24px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 260px;
    }

    .btn {
      display: block;
      text-align: center;
      padding: 14px 0;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.8;
    }

    .btn-projects {
      background-color: #003f7d;
      color: white;
    }

    .btn-secondary {
      background-color: #1a1a1a;
      color: white;
      border: 1px solid #333;
    }
  </style>
</head>
<body>

  <h1>Kento Bushey</h1>
  <p class="tagline">Student · Developer · Educator</p>

  <div class="buttons">
    <a href="/projects" class="btn btn-projects">Projects</a>
    <a href="/referrals" class="btn btn-secondary">Referrals</a>
    <a href="/about" class="btn btn-secondary">About</a>
    <a href="/contact" class="btn btn-secondary">Contact</a>
  </div>

</body>
</html>
